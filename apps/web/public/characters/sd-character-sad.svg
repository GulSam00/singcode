<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 150" fill="none">
  <!-- Shadow -->
  <ellipse cx="60" cy="146" rx="32" ry="5" fill="black" opacity="0.1"/>

  <!-- Hair (back) -->
  <ellipse cx="60" cy="44" rx="34" ry="32" fill="#7C3AED"/>
  <!-- Side hair -->
  <path d="M27 54 Q18 68 20 84 Q22 92 30 94" stroke="#7C3AED" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M93 54 Q102 68 100 84 Q98 92 90 94" stroke="#7C3AED" stroke-width="10" stroke-linecap="round" fill="none"/>

  <!-- Face -->
  <ellipse cx="60" cy="50" rx="28" ry="26" fill="#FFDFC4"/>

  <!-- Bangs -->
  <path d="M32 42 Q36 22 60 20 Q84 22 88 42" fill="#7C3AED"/>
  <path d="M32 42 Q36 32 42 38" fill="#7C3AED"/>
  <path d="M88 42 Q84 32 78 38" fill="#7C3AED"/>

  <!-- Eyes (left) - sad/droopy -->
  <ellipse cx="47" cy="51" rx="6.5" ry="6" fill="#1a1a2e"/>
  <ellipse cx="47" cy="51" rx="4.5" ry="4" fill="#6D28D9"/>
  <ellipse cx="47" cy="52" rx="2.5" ry="2.5" fill="#1a1a2e"/>
  <ellipse cx="44.5" cy="48" rx="2" ry="2" fill="white"/>
  <path d="M40.5 47 Q47 44 53.5 47" stroke="#FFDFC4" stroke-width="2.5" fill="none"/>

  <!-- Eyes (right) - sad/droopy -->
  <ellipse cx="73" cy="51" rx="6.5" ry="6" fill="#1a1a2e"/>
  <ellipse cx="73" cy="51" rx="4.5" ry="4" fill="#6D28D9"/>
  <ellipse cx="73" cy="52" rx="2.5" ry="2.5" fill="#1a1a2e"/>
  <ellipse cx="70.5" cy="48" rx="2" ry="2" fill="white"/>
  <path d="M66.5 47 Q73 44 79.5 47" stroke="#FFDFC4" stroke-width="2.5" fill="none"/>

  <!-- Blush (subdued) -->
  <ellipse cx="39" cy="61" rx="7" ry="4" fill="#F9A8D4" opacity="0.4"/>
  <ellipse cx="81" cy="61" rx="7" ry="4" fill="#F9A8D4" opacity="0.4"/>

  <!-- Mouth (sad frown) -->
  <path d="M52 70 Q60 64 68 70" stroke="#E8968A" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Teardrop -->
  <path d="M44 58 Q43 63 45 64 Q47 63 46 58 Z" fill="#93C5FD" opacity="0.8"/>

  <!-- Neck -->
  <rect x="54" y="74" width="12" height="8" rx="2" fill="#FFDFC4"/>

  <!-- Body -->
  <path d="M36 84 Q33 78 40 76 Q50 73 60 73 Q70 73 80 76 Q87 78 84 84 L86 118 Q70 124 60 124 Q50 124 34 118 Z" fill="#7C3AED"/>

  <!-- Collar detail -->
  <path d="M53 73 L60 83 L67 73" fill="#A78BFA"/>

  <!-- Left arm (down, drooping) -->
  <path d="M36 88 Q26 92 22 100 Q20 106 22 110" stroke="#7C3AED" stroke-width="12" stroke-linecap="round" fill="none"/>
  <circle cx="22" cy="112" r="7" fill="#FFDFC4"/>

  <!-- Right arm (holding magnifying glass) -->
  <path d="M84 88 Q92 90 98 98 Q102 104 100 108" stroke="#7C3AED" stroke-width="12" stroke-linecap="round" fill="none"/>
  <circle cx="99" cy="110" r="7" fill="#FFDFC4"/>

  <!-- Magnifying glass -->
  <circle cx="104" cy="100" r="9" stroke="#4B5563" stroke-width="3" fill="none"/>
  <circle cx="104" cy="100" r="6" fill="#BFDBFE" opacity="0.5"/>
  <circle cx="102" cy="98" r="2" fill="white" opacity="0.6"/>
  <line x1="110" y1="106" x2="116" y2="113" stroke="#4B5563" stroke-width="3" stroke-linecap="round"/>

  <!-- Skirt -->
  <path d="M34 110 Q60 130 86 110 L90 124 Q60 148 30 124 Z" fill="#A78BFA"/>
  <path d="M34 110 Q60 122 86 110" stroke="#C4B5FD" stroke-width="1.5" fill="none"/>

  <!-- Legs -->
  <rect x="46" y="118" width="11" height="24" rx="5.5" fill="#FFDFC4"/>
  <rect x="63" y="118" width="11" height="24" rx="5.5" fill="#FFDFC4"/>

  <!-- Shoes -->
  <ellipse cx="51.5" cy="143" rx="10" ry="5" fill="#1a1a2e"/>
  <ellipse cx="68.5" cy="143" rx="10" ry="5" fill="#1a1a2e"/>
  <ellipse cx="48" cy="141" rx="3" ry="2" fill="#374151" opacity="0.5"/>
  <ellipse cx="65" cy="141" rx="3" ry="2" fill="#374151" opacity="0.5"/>

  <!-- Question marks -->
  <text x="8" y="35" font-size="14" fill="#A78BFA" opacity="0.7">?</text>
  <text x="100" y="30" font-size="12" fill="#C4B5FD" opacity="0.6">?</text>
</svg>
